name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to test'
        required: false
        type: choice
        default: all
        options:
          - all
          - chromium
          - firefox
          - webkit
      qase_plan_id:
        description: 'Qase Plan ID — send results to this plan (leave empty to skip)'
        required: false
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ inputs.browser }}" = "all" ] || [ -z "${{ inputs.browser }}" ]; then
            echo 'matrix=["chromium","firefox","webkit"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ inputs.browser }}"]' >> $GITHUB_OUTPUT
          fi

  test:
    needs: setup
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(needs.setup.outputs.matrix) }}

    name: ${{ matrix.browser }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
        env:
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: 60000

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QASE_PLAN_ID: ${{ inputs.qase_plan_id }}
          BROWSER_NAME: ${{ matrix.browser }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14
